
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Cocina Bendecida - Menú de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-width: 2px; }
        .product-card:hover { border-color: #f97316; transform: translateY(-2px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">

    <div id="app"></div>

    <script>
        // CONFIGURACIÓN DE CONTACTOS
        const NUMERO_1 = "16107140612";
        const NUMERO_2 = "13212951424";
        const NOMBRE_NEGOCIO = "La Cocina Bendecida";

        // BASE DE DATOS CON PRECIO DE SOFRITO ACTUALIZADO
        const PRODUCTOS = [
            // CHEESE DOGS
            { id: 1, nombre: "Cheese Dogs (Pack 6)", precio: 14.00, cat: "Cheese Dogs", desc: "Masa crujiente artesanal con salchicha y queso.", icon: "package" },
            { id: 2, nombre: "Cheese Dogs (Docena 12)", precio: 24.00, cat: "Cheese Dogs", desc: "¡Lleva 12 y ahorra mucho más!", destacado: true, promo: "Ahorra $4.00", icon: "package-check" },
            
            // EMPANADILLAS POLLO
            { id: 3, nombre: "Empanadillas Pollo (Pack 6)", precio: 15.00, cat: "Empanadillas Pollo", desc: "Relleno de pollo sazonado con nuestra receta especial.", icon: "box" },
            { id: 4, nombre: "Empanadillas Pollo (Docena 12)", precio: 25.20, cat: "Empanadillas Pollo", desc: "Ideal para compartir en familia.", destacado: true, promo: "Ahorra $4.80", icon: "shopping-bag" },
            
            // EMPANADILLAS CAMARONES
            { id: 5, nombre: "Empanadillas Camarón (Pack 6)", precio: 19.20, cat: "Empanadillas Camarones", desc: "Sabor premium del mar en cada bocado.", icon: "shrimp" },
            { id: 6, nombre: "Empanadillas Camarón (Docena 12)", precio: 36.60, cat: "Empanadillas Camarones", desc: "La mejor selección de camarones.", destacado: true, promo: "Ahorra $1.80", icon: "waves" },
            
            // PASTELES
            { id: 7, nombre: "Pasteles de Cerdo (Pack 6)", precio: 18.00, cat: "Pasteles", desc: "Masa tradicional de viandas envuelta en hoja de plátano.", icon: "leaf" },
            { id: 8, nombre: "Pasteles de Cerdo (Docena 12)", precio: 32.00, cat: "Pasteles", desc: "Tradición boricua por docena.", destacado: true, promo: "Ahorra $4.00", icon: "box-select" },
            
            // REPOSTERÍA KETO
            { id: 9, nombre: "Polvorón KETO Individual", precio: 3.00, cat: "Repostería KETO", desc: "Harina de Almendra, Aceite de Coco y Syrup de Maple.", icon: "cookie" },
            { id: 10, nombre: "Polvorones KETO (Pack 6)", precio: 15.00, cat: "Repostería KETO", desc: "Pack saludable de 6 polvorones.", destacado: true, promo: "Ahorra $3.00", icon: "gift" },
            
            // SAZONADORES - PRECIO ACTUALIZADO A $9.00
            { id: 11, nombre: "Sofrito Casero (32oz)", precio: 9.00, cat: "Sazonadores", desc: "El secreto natural para que tus comidas queden bendecidas.", icon: "flask-conical" }
        ];

        let carrito = [];
        let vistaActual = 'tienda';

        function render() {
            const app = document.getElementById('app');
            if (vistaActual === 'tienda') app.innerHTML = renderTienda();
            else app.innerHTML = renderCheckout();
            lucide.createIcons();
        }

        function renderTienda() {
            const categorias = [...new Set(PRODUCTOS.map(p => p.cat))];
            let html = `
                <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b px-6 py-4 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-2">
                        <div class="bg-orange-600 p-2 rounded-xl text-white shadow-lg shadow-orange-100"><i data-lucide="chef-hat" size="20"></i></div>
                        <span class="text-xl font-black text-stone-900 tracking-tighter uppercase">${NOMBRE_NEGOCIO}</span>
                    </div>
                    <button onclick="toggleCart()" class="relative p-3 bg-stone-100 rounded-2xl hover:bg-orange-50 transition-colors">
                        <i data-lucide="shopping-cart" class="text-stone-700"></i>
                        ${carrito.length > 0 ? `<span class="absolute -top-1 -right-1 bg-orange-600 text-white text-[10px] font-bold w-6 h-6 flex items-center justify-center rounded-full border-2 border-white animate-pulse">${carrito.reduce((s, i) => s + i.cant, 0)}</span>` : ''}
                    </button>
                </nav>
                <main class="max-w-5xl mx-auto px-4 py-12">
                    <div class="text-center mb-16">
                        <h1 class="text-5xl font-black text-stone-900 mb-4 tracking-tighter">Sabor que es <span class="text-orange-600">Bendición</span></h1>
                        <p class="text-stone-400 text-lg font-medium italic">"Gustad, y ved que es bueno Jehová."</p>
                    </div>
            `;

            categorias.forEach(cat => {
                const prodsCat = PRODUCTOS.filter(p => p.cat === cat);
                html += `
                    <div class="mb-12">
                        <h2 class="text-2xl font-black mb-6 uppercase tracking-tight text-stone-800 flex items-center gap-4">
                            ${cat} <div class="h-[2px] flex-1 bg-stone-200 rounded-full"></div>
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${prodsCat.map(p => `
                                <div class="product-card bg-white p-6 rounded-[2rem] border-stone-100 shadow-sm flex items-center justify-between gap-4">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <h3 class="text-lg font-extrabold leading-tight">${p.nombre}</h3>
                                            ${p.destacado ? `<span class="bg-green-600 text-white text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter">${p.promo}</span>` : ''}
                                        </div>
                                        <p class="text-stone-500 text-xs mb-3 line-clamp-2">${p.desc}</p>
                                        <span class="text-2xl font-black text-orange-600 tracking-tighter">$${p.precio.toFixed(2)}</span>
                                    </div>
                                    <button onclick="agregar(${p.id})" class="bg-stone-900 text-white w-14 h-14 rounded-2xl flex items-center justify-center hover:bg-orange-600 transition-all active:scale-95 shadow-md shrink-0">
                                        <i data-lucide="plus" size="24"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            html += `</main>${renderCarritoLateral()}`;
            return html;
        }

        function renderCarritoLateral() {
            const total = carrito.reduce((s, i) => s + (i.precio * i.cant), 0);
            return `
                <div id="cart-sidebar" class="fixed inset-0 z-50 hidden">
                    <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm" onclick="toggleCart()"></div>
                    <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-8 flex flex-col shadow-2xl">
                        <div class="flex justify-between items-center mb-10">
                            <h2 class="text-3xl font-black tracking-tighter uppercase">Mi <span class="text-orange-600">Pedido</span></h2>
                            <button onclick="toggleCart()" class="p-2 bg-stone-100 rounded-full"><i data-lucide="x"></i></button>
                        </div>
                        <div class="flex-1 overflow-y-auto space-y-6 hide-scrollbar">
                            ${carrito.length === 0 ? `
                                <div class="text-center py-20 opacity-30 italic">
                                    <i data-lucide="shopping-basket" size="48" class="mx-auto mb-4"></i>
                                    <p class="font-bold">Tu canasta está vacía</p>
                                </div>` : 
                                carrito.map(i => `
                                    <div class="flex gap-4 items-center border-b border-stone-50 pb-4">
                                        <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center text-orange-600">
                                            <i data-lucide="${i.icon}" size="20"></i>
                                        </div>
                                        <div class="flex-1">
                                            <h4 class="font-bold text-sm leading-tight">${i.nombre}</h4>
                                            <p class="text-orange-600 font-black text-sm">$${(i.precio * i.cant).toFixed(2)}</p>
                                        </div>
                                        <div class="flex items-center gap-3 bg-stone-50 p-2 rounded-xl">
                                            <button onclick="cambiarCant(${i.id}, -1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-lg"><i data-lucide="minus" size="14"></i></button>
                                            <span class="font-black text-sm w-4 text-center">${i.cant}</span>
                                            <button onclick="cambiarCant(${i.id}, 1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-lg"><i data-lucide="plus" size="14"></i></button>
                                        </div>
                                    </div>
                                `).join('')
                            }
                        </div>
                        ${carrito.length > 0 ? `
                            <div class="pt-8 border-t border-stone-100 mt-8">
                                <div class="flex justify-between items-end mb-8">
                                    <span class="text-stone-400 font-bold text-[10px] uppercase tracking-widest italic">Subtotal</span>
                                    <span class="text-4xl font-black tracking-tighter text-stone-900">$${total.toFixed(2)}</span>
                                </div>
                                <button onclick="irACheckout()" class="w-full bg-stone-900 text-white py-6 rounded-3xl font-black text-xl shadow-xl hover:bg-orange-600 transition-all active:scale-95">Continuar</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderCheckout() {
            const total = carrito.reduce((s, i) => s + (i.precio * i.cant), 0);
            return `
                <div class="max-w-lg mx-auto px-6 py-10">
                    <button onclick="volverTienda()" class="mb-8 flex items-center gap-2 text-stone-400 font-black text-xs uppercase tracking-widest"><i data-lucide="arrow-left" size="16"></i> Volver</button>
                    <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-stone-50">
                        <h2 class="text-4xl font-black mb-8 text-center tracking-tighter underline decoration-orange-200">Confirmación</h2>
                        <div class="space-y-6 mb-8">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-stone-400 mb-2 ml-4">Nombre Completo *</label>
                                <input id="form-nombre" type="text" placeholder="Tu nombre y apellido" class="w-full p-5 bg-stone-50 rounded-[1.5rem] border-2 border-transparent focus:border-orange-500 outline-none font-bold text-lg">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-stone-400 mb-2 ml-4">Notas (Sabores, dirección, etc.)</label>
                                <textarea id="form-notas" placeholder="Ej. 6 de carne y 6 de pollo..." class="w-full p-5 bg-stone-50 rounded-[1.5rem] border-2 border-transparent focus:border-orange-500 outline-none font-bold text-lg h-24 resize-none"></textarea>
                            </div>
                        </div>
                        <div class="bg-stone-900 text-white p-8 rounded-[2rem] mb-8 flex justify-between items-center">
                            <span class="font-bold opacity-60 uppercase text-[10px] tracking-widest font-black">Total a pagar:</span>
                            <span class="text-4xl font-black tracking-tighter">$${total.toFixed(2)}</span>
                        </div>
                        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white py-6 rounded-3xl font-black text-xl flex items-center justify-center gap-4 shadow-xl hover:bg-green-700 transition-all active:scale-95">
                            <i data-lucide="send"></i> Enviar Pedido por WhatsApp
                        </button>
                    </div>
                </div>
            `;
        }

        function agregar(id) {
            const prod = PRODUCTOS.find(p => p.id === id);
            const enCarrito = carrito.find(i => i.id === id);
            if (enCarrito) enCarrito.cant++;
            else carrito.push({ ...prod, cant: 1 });
            render();
            toggleCart(true);
        }

        function cambiarCant(id, delta) {
            const item = carrito.find(i => i.id === id);
            item.cant += delta;
            if (item.cant <= 0) carrito = carrito.filter(i => i.id !== id);
            render();
            toggleCart(true);
        }

        function toggleCart(show = null) {
            const sidebar = document.getElementById('cart-sidebar');
            if (show === true) sidebar.classList.remove('hidden');
            else if (show === false) sidebar.classList.add('hidden');
            else sidebar.classList.toggle('hidden');
        }

        function irACheckout() { vistaActual = 'checkout'; render(); }
        function volverTienda() { vistaActual = 'tienda'; render(); }

        function enviarWhatsApp() {
            const nombre = document.getElementById('form-nombre').value.trim();
            const notas = document.getElementById('form-notas').value;
            
            const palabras = nombre.split(/\s+/);
            if (palabras.length < 2 || palabras[1].length < 1) {
                alert("Por favor, ingresa tu Nombre y Apellido completos.");
                return;
            }

            let msg = `*🛒 NUEVO PEDIDO - ${NOMBRE_NEGOCIO.toUpperCase()}*\n\n`;
            msg += `*CLIENTE:* ${nombre.toUpperCase()}\n`;
            msg += `----------------------------\n`;
            carrito.forEach(i => { msg += `✅ ${i.cant}x ${i.nombre} - $${(i.precio * i.cant).toFixed(2)}\n`; });
            const total = carrito.reduce((s, i) => s + (i.precio * i.cant), 0);
            msg += `----------------------------\n`;
            msg += `*TOTAL A PAGAR: $${total.toFixed(2)}*\n\n`;
            if (notas) msg += `*NOTAS:* ${notas}`;

            window.open(`https://wa.me/${NUMERO_1}?text=${encodeURIComponent(msg)}`, '_blank');
            
            setTimeout(() => {
                if(confirm("¿Deseas enviar el pedido también al segundo número de contacto?")) {
                    window.open(`https://wa.me/${NUMERO_2}?text=${encodeURIComponent(msg)}`, '_blank');
                }
            }, 1500);
        }

        render();
    </script>
</body>
</html>

```
